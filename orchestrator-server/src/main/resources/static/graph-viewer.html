<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Orchestrator — 3D Graph Viewer</title>
    <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1.8.2/dist/three-spritetext.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --muted: #8b949e;
            --accent: #58a6ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }
        #controls {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        #controls select, #controls input {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 0.85rem;
        }
        #controls input { width: 180px; }
        #graph-container { width: 100vw; height: 100vh; }
        #details-panel {
            position: fixed;
            top: 60px;
            right: 16px;
            width: 300px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            z-index: 100;
            max-height: 80vh;
            overflow-y: auto;
        }
        #details-panel.hidden { display: none; }
        #details-panel h3 { margin-bottom: 8px; color: var(--accent); }
        #details-panel .field { margin-bottom: 6px; font-size: 0.85rem; }
        #details-panel .field .label { color: var(--muted); }
        #legend {
            position: fixed;
            bottom: 16px;
            left: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            z-index: 100;
            font-size: 0.8rem;
        }
        #legend .item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        #legend .dot { width: 12px; height: 12px; border-radius: 50%; }
        #stats {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.8rem;
            color: var(--muted);
            z-index: 100;
        }
    </style>
</head>
<body>
<div id="controls">
    <input id="project-select" list="project-list" placeholder="Type project key..." autocomplete="off">
    <datalist id="project-list"></datalist>
    <select id="view-select">
        <option value="hierarchy">Hierarchy</option>
        <option value="dependency">Dependency</option>
        <option value="team">Team</option>
    </select>
    <input id="search" placeholder="Search ticket...">
</div>
<div id="graph-container"></div>
<div id="details-panel" class="hidden"></div>
<div id="legend"></div>
<div id="stats">Nodes: 0 | Edges: 0</div>

<script>
(function() {
    'use strict';

    var LABEL_MAX_CHARS = 30;
    var graph = null;
    var graphData = { nodes: [], edges: [] };

    function init() {
        graph = ForceGraph3D()(document.getElementById('graph-container'))
            .backgroundColor('#0d1117')
            .nodeColor(function(n) { return n.color; })
            .nodeVal(function(n) { return n.size; })
            .nodeLabel(function(n) { return n.id + ': ' + n.label; })
            .nodeThreeObjectExtend(true)
            .nodeThreeObject(function(n) { return createNodeLabel(n); })
            .linkColor(function(l) { return getEdgeColor(l); })
            .linkWidth(function(l) { return getEdgeWidth(l); })
            .linkLabel(function(l) { return l.label; })
            .linkDirectionalArrowLength(4)
            .linkDirectionalArrowRelPos(1)
            .onNodeClick(function(n) { showDetails(n); })
            .onNodeHover(function(n) { highlightConnected(n); })
            .d3AlphaDecay(0.02)
            .d3VelocityDecay(0.3)
            .warmupTicks(100)
            .cooldownTicks(200);

        bindControls();
        loadProjects();
    }

    function loadProjects() {
        fetch('/sync/projects')
            .then(function(r) { if (r.ok) return r.json(); throw new Error('Failed'); })
            .then(function(projects) {
                var datalist = document.getElementById('project-list');
                datalist.innerHTML = '';
                projects.forEach(function(p) {
                    var opt = document.createElement('option');
                    opt.value = p;
                    datalist.appendChild(opt);
                });
                // Restore last selected or default to first
                var input = document.getElementById('project-select');
                var saved = localStorage.getItem('graph-project');
                if (saved && projects.indexOf(saved) !== -1) {
                    input.value = saved;
                } else if (projects.length > 0) {
                    input.value = projects[0];
                }
                loadGraph();
            })
            .catch(function(err) {
                console.error('Failed to load projects:', err);
                document.getElementById('project-select').value = 'MTO';
                loadGraph();
            });
    }

    // ─── Edge Styling (MTO-82) ─────────────────────────────────────────
    var EDGE_STYLES = {
        'parent-of':  { color: '#6e7681', width: 1.5, dash: null },
        'child-of':   { color: '#6e7681', width: 1.5, dash: null },
        'relates to': { color: '#58a6ff', width: 1.0, dash: [5, 5] },
        'blocks':     { color: '#f85149', width: 2.0, dash: [2, 3] },
        'blocked by': { color: '#f85149', width: 2.0, dash: [2, 3] },
        'duplicates': { color: '#8b949e', width: 0.8, dash: [1, 4] },
        'clones':     { color: '#8b949e', width: 0.8, dash: [1, 4] }
    };
    var DEFAULT_EDGE = { color: '#484f58', width: 1.0, dash: null };

    function getEdgeStyle(link) {
        var label = (link.label || '').toLowerCase();
        return EDGE_STYLES[label] || DEFAULT_EDGE;
    }

    function getEdgeColor(link) { return getEdgeStyle(link).color; }
    function getEdgeWidth(link) { return getEdgeStyle(link).width; }
    function getEdgeDash(link) { return getEdgeStyle(link).dash; }

    function createNodeLabel(node) {
        var isEpic = node.type === 'Epic';
        var text = node.id;
        if (isEpic && node.label) {
            var summary = node.label.length > LABEL_MAX_CHARS
                ? node.label.substring(0, LABEL_MAX_CHARS) + '...'
                : node.label;
            text = node.id + '\n' + summary;
        }

        var sprite = new SpriteText(text);
        sprite.color = '#ffffff';
        sprite.textHeight = isEpic ? 3.5 : 2.5;
        sprite.backgroundColor = 'rgba(0,0,0,0.6)';
        sprite.padding = 1.5;
        sprite.borderRadius = 3;
        sprite.fontFace = 'Arial, sans-serif';
        sprite.fontWeight = isEpic ? 'bold' : 'normal';
        sprite.position.set(0, (node.size || 5) + 3, 0);
        return sprite;
    }

    function bindControls() {
        document.getElementById('view-select').onchange = loadGraph;
        var projectInput = document.getElementById('project-select');
        projectInput.onchange = loadGraph;
        projectInput.onkeydown = function(e) {
            if (e.key === 'Enter') loadGraph();
        };
        document.getElementById('search').onkeydown = function(e) {
            if (e.key === 'Enter') searchNode(e.target.value);
        };
    }

    function loadGraph() {
        var project = document.getElementById('project-select').value.trim();
        var view = document.getElementById('view-select').value;
        if (!project) return;

        localStorage.setItem('graph-project', project);

        fetch('/sync/graph/' + project + '?view=' + view)
            .then(function(r) { if (r.ok) return r.json(); throw new Error('Failed'); })
            .then(function(data) {
                graphData = data;
                var links = data.edges.map(function(e) { return Object.assign({}, e); });
                graph.graphData({ nodes: data.nodes, links: links });
                updateStats(data.metadata);
                updateLegend(data.nodes);
            })
            .catch(function(err) { console.error('Graph load failed:', err); });
    }

    function showDetails(node) {
        var panel = document.getElementById('details-panel');
        panel.classList.remove('hidden');
        panel.innerHTML =
            '<h3>' + node.id + '</h3>' +
            '<div class="field"><span class="label">Summary:</span> ' + node.label + '</div>' +
            '<div class="field"><span class="label">Type:</span> ' + node.type + '</div>' +
            '<div class="field"><span class="label">Status:</span> ' + node.status + '</div>' +
            '<div class="field"><span class="label">Priority:</span> ' + (node.priority || 'N/A') + '</div>' +
            '<div class="field"><span class="label">Group:</span> ' + node.group + '</div>';
    }

    function highlightConnected(node) {
        if (!node) {
            graph.nodeColor(function(n) { return n.color; });
            graph.linkColor(function(l) { return l.color; });
            return;
        }
        var connected = new Set();
        graphData.edges.forEach(function(e) {
            if (e.source === node.id || e.source.id === node.id) connected.add(e.target.id || e.target);
            if (e.target === node.id || e.target.id === node.id) connected.add(e.source.id || e.source);
        });
        connected.add(node.id);
        graph.nodeColor(function(n) { return connected.has(n.id) ? n.color : '#333333'; });
        graph.linkColor(function(l) {
            var src = l.source.id || l.source;
            var tgt = l.target.id || l.target;
            return (src === node.id || tgt === node.id) ? '#ffffff' : '#222222';
        });
    }

    function searchNode(query) {
        if (!query) return;
        var q = query.toLowerCase().trim();
        // Exact ID match first
        var found = graphData.nodes.find(function(n) { return n.id.toLowerCase() === q; });
        // Then partial match on ID or label
        if (!found) {
            found = graphData.nodes.find(function(n) {
                return n.id.toLowerCase().includes(q) || n.label.toLowerCase().includes(q);
            });
        }
        if (found) {
            graph.cameraPosition({ x: found.x, y: found.y, z: found.z + 200 }, found, 1000);
            showDetails(found);
        }
    }

    function updateStats(metadata) {
        document.getElementById('stats').textContent =
            'Nodes: ' + metadata.nodeCount + ' | Edges: ' + metadata.edgeCount + ' | View: ' + metadata.viewMode;
    }

    function updateLegend(nodes) {
        var groups = [];
        var colorMap = {};
        nodes.forEach(function(n) {
            if (groups.indexOf(n.group) === -1) groups.push(n.group);
            colorMap[n.group] = n.color;
        });
        var nodeHtml = groups.map(function(g) {
            return '<div class="item"><div class="dot" style="background:' + colorMap[g] + '"></div>' + g + '</div>';
        }).join('');

        // Edge legend
        var edgeLabels = [];
        graphData.edges.forEach(function(e) {
            if (edgeLabels.indexOf(e.label) === -1) edgeLabels.push(e.label);
        });
        var edgeHtml = '';
        if (edgeLabels.length > 0) {
            edgeHtml = '<div style="margin-top:8px;border-top:1px solid #30363d;padding-top:8px;font-size:0.75rem;color:#8b949e;">Edges:</div>';
            edgeHtml += edgeLabels.map(function(label) {
                var style = EDGE_STYLES[label] || DEFAULT_EDGE;
                var lineStyle = style.dash ? 'dashed' : 'solid';
                return '<div class="item"><div style="width:20px;height:0;border-top:2px ' + lineStyle + ' ' + style.color + '"></div>' + label + '</div>';
            }).join('');
        }
        document.getElementById('legend').innerHTML = nodeHtml + edgeHtml;
    }

    document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
