kb:
  server:
    port: 9181
    transport: stdio

  database:
    url: "jdbc:postgresql://localhost:5432/mcp_orchestrator"
    schema: "kb"
    username: "kb_app"
    password: ""
    pool:
      maximum_size: 10
      minimum_idle: 2
      idle_timeout_ms: 600000
      connection_timeout_ms: 30000

  embedding:
    provider: "ollama"
    model: "nomic-embed-text"
    base_url: "http://localhost:11434"
    dimensions: 768
    cache_enabled: true
    cache_max_size: 200
    cache_ttl_minutes: 10

  vector_db:
    provider: "pgvector"
    collection_name: "kb_entries"
    host: "localhost"
    port: 6333

  segmentation:
    provider: "ollama"
    model_name: "llama3"
    temperature: 0.1
    timeout_seconds: 30
    max_segment_length: 2000
    br_local_only: true

  masking:
    strategies:
      - email
      - phone
      - bank_account
      - id_card
      - name
    placeholder_format: "[{TYPE}_{INDEX}]"

  security:
    encryption_key: ""
    br_encryption_key: ""
    default_role: "developer"
    session_ttl_minutes: 30
    rate_limit:
      pii_unmask_per_hour: 10
      br_level1_per_hour: 5
      br_level2_per_hour: 15
      br_level3_per_hour: 30

  queue:
    hpq_capacity: 100
    npq_capacity: 1000
    worker_count: 2
    watchdog_interval_seconds: 60
    stuck_threshold_minutes: 5
    max_retries: 3
    base_delay_ms: 1000

  sync:
    batch_size: 50

  audit:
    enabled: true
    retention_days: 90
