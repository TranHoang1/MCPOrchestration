name: Release MCP Orchestrator

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Orchestrator Server (Shadow JAR)
        run: ./gradlew :orchestrator-server:shadowJar

      - name: Build Node.js Bridge
        run: |
          cd mcp-client-bridge
          npm ci
          npm run build
          npm test

      - name: Package Node.js Bridge
        run: |
          cd mcp-client-bridge
          tar -czf ../mcp-bridge-nodejs.tar.gz dist/ package.json node_modules/

      - name: Make Bash bridge executable
        run: chmod +x mcp-bridge-bash/mcp-bridge.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            orchestrator-server/build/libs/mcp-orchestrator-all.jar
            mcp-bridge-nodejs.tar.gz
            mcp-bridge-bash/mcp-bridge.sh
            mcp-bridge-powershell/mcp-bridge.ps1
            mcp-bridge-cmd/mcp-bridge.cmd

  publish-python-bridge:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build Python package
        run: |
          cd mcp-bridge-python
          python -m build

      - name: Publish to PyPI
        run: |
          cd mcp-bridge-python
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
