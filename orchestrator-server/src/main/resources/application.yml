orchestrator:
  server:
    port: 9180
    transport: http-streamable

  auth:
    jwt:
      secret: ${JWT_SECRET:-dev-only-insecure-secret-key-change-in-production-32b}
      algorithm: HS256
      sessionExpiryHours: 4
      bridgeTokenExpiryDays: 30
      maxBridgeTokenDays: 365
      issuer: mcp-orchestrator
    lockout:
      maxAttempts: 5
      lockoutMinutes: 15
    deprecated:
      allowEmailHeader: true
      emailHeaderName: X-User-Email

  discovery:
    top_k: 5
    similarity_threshold: 0.7
    max_query_length: 2000
    fallback_to_keyword: true

  execution:
    timeout_seconds: 30
    validate_arguments: true
    max_retries: 1

  embedding:
    provider: ollama
    model: nomic-embed-text:latest
    api_key: "unused"
    dimensions: 768
    cache_enabled: true
    cache_max_size: 100
    cache_ttl_minutes: 5

  vector_db:
    provider: postgres
    host: localhost
    port: 5432
    collection_name: mcp_db
    user: postgres
    password: postgres

  health:
    check_interval_seconds: 30
    auto_reconnect: true
    max_reconnect_attempts: 5

  file-proxy:
    enabled: true
    max-size-mb: 50
    temp-directory: "./tmp/mcp-file-proxy"
    ttl-minutes: 60
    cleanup-interval-minutes: 15
    shutdown-timeout-seconds: 30
    input-proxy-enabled: true
    output-proxy-enabled: true
    runtime-detection-enabled: true
    servers: {}

  upstream_servers: []
